services:
  db:
    image: postgres:17
    container_name: stego-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-stegosign}
      POSTGRES_USER:     ${POSTGRES_USER:-sre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sre}
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sre} -d ${POSTGRES_DB:-stegosign}"]
      interval: 10s
      timeout: 5s
      retries: 5

  files:
    image: quay.io/minio/aistor/minio:latest
    container_name: stego-files
    restart: unless-stopped
    expose:
      - "9000"
    ports:
      - "${MINIO_CONSOLE_PORT:-55546}:9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fn-stella-sre}
    volumes:
      - minio_data:/mnt/data
      - ./minio.license:/minio.license:ro
    command: server /mnt/data --console-address :9001 --license /minio.license
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: stego-server
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgres://${POSTGRES_USER:-sre}:${POSTGRES_PASSWORD:-sre}@db:5432/${POSTGRES_DB:-stegosign}
      POSTGRES_DB:       ${POSTGRES_DB:-stegosign}
      POSTGRES_USER:     ${POSTGRES_USER:-sre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sre}
      POSTGRES_HOST:     db
      POSTGRES_PORT:     5432
      MINIO_ENDPOINT:    http://files:9000
      MINIO_ACCESS_KEY:  ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY:  ${MINIO_ROOT_PASSWORD:-fn-stella-sre}
      SERVER_HOST:       ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT:       4000
      RUST_LOG:          ${RUST_LOG:-info}
      SIGNING_KEY:       ${SIGNING_KEY}
      VERIFY_KEY:        ${VERIFY_KEY}
      APP_BASE_URL:      ${APP_BASE_URL:-http://localhost:55548}
    expose:
      - "4000"
    server:
    ports:
      - "${SERVER_PORT:-55547}:4000"
    depends_on:
      db:
        condition: service_healthy
      files:
        condition: service_healthy

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: stego-app
    restart: unless-stopped
    environment:
      APP_ENV:             ${APP_ENV:-production}
      API_BASE_URL:        http://server:4000          # SSR: interno Docker
      PUBLIC_API_BASE_URL: http://localhost:55547  # CSR: desde el browser
      LEPTOS_OUTPUT_NAME:  ${LEPTOS_OUTPUT_NAME:-stego-app}
      LEPTOS_SITE_ROOT:    ${LEPTOS_SITE_ROOT:-site}
      LEPTOS_SITE_PKG_DIR: ${LEPTOS_SITE_PKG_DIR:-pkg}
      LEPTOS_SITE_ADDR:    0.0.0.0:3001
      LEPTOS_RELOAD_PORT:  ${LEPTOS_RELOAD_PORT:-3002}
    ports:
      - "${APP_PORT:-55548}:3001"
    depends_on:
      - server

volumes:
  pg_data:
  minio_data: