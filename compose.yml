services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stegosign}
      POSTGRES_USER: ${POSTGRES_USER:-sre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sre}
    volumes:
      - pg_data:/var/lib/postgresql/data

  files:
    image: quay.io/minio/aistor/minio:latest
    container_name: aistor-server
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fnstellasre}
    volumes:
      - minio_data:/mnt/data
      - ./minio.license:/minio.license:ro
    command: server /mnt/data --console-address :${MINIO_CONSOLE_PORT:-9001} --license /minio.license
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio_data:
  pg_data: